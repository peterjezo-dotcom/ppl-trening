<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PPL Tréning</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B1918">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PPL Tréning">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#1B1918;
    --surface:#242019;
    --surface-2:#2E2820;
    --line:#3A342A;
    --text:#EDE7DD;
    --text-dim:#9C948A;
    --accent:#C08A34;
    --accent-dim:#8A6425;
    --good:#3E7C74;
    --warn:#B23A2F;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;}
  .app{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:16px 14px 60px;
    max-width:520px;
    margin:0 auto;
  }
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .brand h1{
    font-size:20px;
    font-weight:800;
    letter-spacing:0.06em;
    text-transform:uppercase;
    margin:0;
  }
  .brand h1 span{color:var(--accent);}
  .week-badge{
    font-family:"SFMono-Regular",Consolas,monospace;
    font-size:13px;
    color:var(--text-dim);
    border:1px solid var(--line);
    border-radius:20px;
    padding:4px 10px;
  }
  .deload-banner{
    background:linear-gradient(90deg,var(--warn),#8A2A22);
    color:#F5E9E6;
    padding:10px 14px;
    border-radius:12px;
    font-size:13px;
    font-weight:700;
    margin-bottom:14px;
    line-height:1.4;
  }
  .tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:6px;
    margin-bottom:14px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    padding:8px 12px;
    border-radius:10px;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    cursor:pointer;
  }
  .tab.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#1B1918;
  }
  .tab .today-dot{
    display:inline-block;width:5px;height:5px;border-radius:50%;
    background:var(--good);margin-left:5px;vertical-align:middle;
  }
  .day-type{
    font-size:12px;color:var(--text-dim);margin:-8px 0 14px 2px;
    text-transform:uppercase;letter-spacing:0.05em;
  }
  .rest-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 16px;
    text-align:center;
  }
  .rest-card .big{font-size:15px;font-weight:700;margin-bottom:10px;}
  .rest-card input{
    width:110px;text-align:center;background:var(--surface-2);
    border:1px solid var(--line);color:var(--text);border-radius:8px;
    padding:8px;font-size:15px;font-family:inherit;margin:0 8px;
  }
  .rest-card button{
    margin-top:14px;
  }
  .exercise{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .exercise.done{border-color:var(--good);}
  .ex-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:13px 14px;
    cursor:pointer;
  }
  .ex-name{font-size:14.5px;font-weight:700;}
  .ex-target{
    font-family:"SFMono-Regular",Consolas,monospace;
    font-size:12px;color:var(--text-dim);margin-top:2px;
  }
  .ex-last{
    font-family:"SFMono-Regular",Consolas,monospace;
    font-size:11px;color:var(--accent);margin-top:2px;
  }
  .chevron{color:var(--text-dim);font-size:13px;transition:transform .15s;}
  .exercise.open .chevron{transform:rotate(90deg);}
  .ex-body{display:none;padding:0 14px 14px;}
  .exercise.open .ex-body{display:block;}
  .set-row{
    display:flex;align-items:center;gap:8px;
    padding:7px 0;border-top:1px solid var(--line);
  }
  .set-row:first-child{border-top:none;}
  .set-label{
    width:22px;font-family:"SFMono-Regular",Consolas,monospace;
    font-size:12px;color:var(--text-dim);
  }
  .set-row input{
    flex:1;min-width:0;background:var(--surface-2);
    border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:9px 6px;font-size:15px;
    font-family:"SFMono-Regular",Consolas,monospace;text-align:center;
  }
  .set-row .unit{font-size:11px;color:var(--text-dim);width:34px;}
  .plate-row{display:flex;gap:4px;margin-top:2px;}
  .plate{
    width:16px;height:16px;border-radius:50%;
    border:2px solid var(--line);
  }
  .plate.filled{background:var(--accent);border-color:var(--accent);}
  button.primary{
    background:var(--accent);color:#1B1918;border:none;
    font-weight:800;font-size:14px;padding:12px 18px;
    border-radius:10px;width:100%;cursor:pointer;
    text-transform:uppercase;letter-spacing:0.04em;
  }
  button.primary:active{background:var(--accent-dim);}
  button.ghost{
    background:transparent;border:1px solid var(--line);
    color:var(--text-dim);font-size:12px;padding:9px 14px;
    border-radius:10px;cursor:pointer;
  }
  .finish-bar{margin-top:16px;}
  .timer-bar{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--surface);border-top:2px solid var(--accent);
    color:var(--text);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:none;align-items:center;gap:8px;flex-wrap:nowrap;
    z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,0.4);
    max-width:520px;margin:0 auto;
  }
  .timer-bar.active{display:flex;}
  .timer-ring{
    position:relative;width:42px;height:42px;flex:0 0 auto;
  }
  .timer-ring svg{transform:rotate(-90deg);width:42px;height:42px;}
  .timer-ring circle{fill:none;stroke-width:4;}
  .timer-ring .bg{stroke:var(--line);}
  .timer-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
  .timer-ring .num{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:"SFMono-Regular",Consolas,monospace;font-size:12px;font-weight:700;
  }
  .timer-info{flex:1 1 auto;min-width:0;overflow:hidden;}
  .timer-label{
    font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.03em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .timer-time{font-family:"SFMono-Regular",Consolas,monospace;font-size:19px;font-weight:800;}
  .timer-actions{display:flex;gap:5px;flex:0 0 auto;}
  .timer-actions button{
    background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:7px 8px;font-size:11px;font-weight:700;cursor:pointer;
    white-space:nowrap;
  }
  .timer-actions button.skip{color:var(--warn);}
  .saved-msg{
    text-align:center;color:var(--good);font-size:13px;
    font-weight:700;margin-top:10px;display:none;
  }
  .section-title{
    font-size:12px;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--text-dim);margin:24px 0 8px 2px;font-weight:700;
  }
  .history-item{
    background:var(--surface);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-bottom:6px;
    display:flex;justify-content:space-between;font-size:13px;
  }
  .history-item .h-date{color:var(--text-dim);font-family:"SFMono-Regular",Consolas,monospace;}
  .settings-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 0;font-size:13px;color:var(--text-dim);
  }
  .interval-btns{display:flex;gap:6px;}
  .interval-btns button{
    background:var(--surface-2);border:1px solid var(--line);
    color:var(--text);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;
  }
  .interval-btns button.active{background:var(--accent);color:#1B1918;border-color:var(--accent);}
  .empty{color:var(--text-dim);font-size:13px;text-align:center;padding:20px 0;}
</style>
</head>
<body>
<div class="app" id="app">Načítavam...</div>
<div class="timer-bar" id="timerBar">
  <div class="timer-ring">
    <svg viewBox="0 0 52 52">
      <circle class="bg" cx="26" cy="26" r="22"></circle>
      <circle class="fg" id="timerCircle" cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="0"></circle>
    </svg>
    <div class="num" id="timerRingNum">💤</div>
  </div>
  <div class="timer-info">
    <div class="timer-label" id="timerLabel">Odpočinok</div>
    <div class="timer-time" id="timerTime">00:00</div>
  </div>
  <div class="timer-actions">
    <button onclick="timerAddTime(15)">+15s</button>
    <button id="timerPauseBtn" onclick="timerPauseResume()">⏸</button>
    <button class="skip" onclick="timerSkip()">Zrušiť</button>
  </div>
</div>

<script>
const DAYS = [
  {id:'mon', label:'Po', full:'Pondelok', type:'Push + Core', rest:false, exercises:[
    {name:'Bench Press', sets:3, target:'8-12', rest:150},
    {name:'Incline DB Press 30° (Incline Dumbbell Press)', sets:3, target:'8-12', rest:150},
    {name:'Pec Deck / Cable Fly', sets:3, target:'8-12', rest:75},
    {name:'Bočné upažovanie (Lateral Raise)', sets:3, target:'8-12', rest:75},
    {name:'Triceps na kladke — rope (Triceps Rope Pushdown)', sets:3, target:'8-12', rest:75},
    {name:'Dips na hrazde (Bar Dips)', sets:3, target:'8-12', rest:150},
    {name:'Cable crunch', sets:3, target:'12-15', rest:60},
    {name:'Plank', sets:3, target:'30-45s', duration:true, rest:60},
  ]},
  {id:'tue', label:'Ut', full:'Utorok', type:'Pull + Core', rest:false, exercises:[
    {name:'Zhyby / sťahovanie kladky (Pull-Ups / Lat Pulldown)', sets:3, target:'8-12', rest:150},
    {name:'Sťahovanie kladky neutrál (Neutral-Grip Lat Pulldown)', sets:3, target:'8-12', rest:150},
    {name:'Chest-supported row', sets:3, target:'8-12', rest:150},
    {name:'Sedavé veslovanie (Seated Cable Row)', sets:3, target:'8-12', rest:150},
    {name:'Zdvíhanie obojručky (Barbell Curl)', sets:3, target:'8-12', rest:75},
    {name:'Zdvíhanie na šikmej lavičke (Incline Dumbbell Curl)', sets:3, target:'8-12', rest:75},
    {name:'Hanging knee raise', sets:3, target:'10-15', rest:60},
    {name:'Pallof press', sets:3, target:'10-12/str', rest:60},
  ]},
  {id:'wed', label:'St', full:'Streda', type:'Legs (koleno) + Core', rest:false, exercises:[
    {name:'Rumunský mŕtvy ťah — RDL (Romanian Deadlift)', sets:3, target:'8-12', rest:150},
    {name:'Leg press', sets:3, target:'8-12', rest:150},
    {name:'Hip thrust', sets:3, target:'8-12', rest:150},
    {name:'Leg curl', sets:3, target:'8-12', rest:75},
    {name:'Leg extension — ľahšie (Leg Extension)', sets:3, target:'12-15', rest:75},
    {name:'Adduktorový stroj (Hip Adductor Machine)', sets:3, target:'8-12', rest:75},
    {name:'Výpony na lýtka (Calf Raise)', sets:3, target:'8-12', rest:75},
    {name:'Cable woodchop / deadbug', sets:3, target:'10-12/str', rest:60},
  ]},
  {id:'thu', label:'Št', full:'Štvrtok', type:'Rest', rest:true, steps:8000},
  {id:'fri', label:'Pi', full:'Piatok', type:'Push #2 + Core', rest:false, exercises:[
    {name:'Shoulder Press — jednoručky (Dumbbell Shoulder Press)', sets:3, target:'8-12', rest:150},
    {name:'Dips na hrazde (Bar Dips)', sets:3, target:'8-12', rest:150},
    {name:'Skullcrusher (EZ-Bar Skullcrusher)', sets:3, target:'8-12', rest:75},
    {name:'Bočné upažovanie (Lateral Raise)', sets:3, target:'8-12', rest:75},
    {name:'Zdvíhanie s EZ osou (EZ-Bar Curl)', sets:3, target:'8-12', rest:75},
    {name:'Zdvíhanie na kladke (Cable Curl)', sets:3, target:'8-12', rest:75},
    {name:'Ab wheel / cable crunch', sets:3, target:'10-15', rest:60},
  ]},
  {id:'sat', label:'So', full:'Sobota', type:'Pull #2 + Core', rest:false, exercises:[
    {name:'Leg press / Hip thrust', sets:3, target:'8-12', rest:150},
    {name:'Veslovanie s oporou hrudníka (Chest-Supported Row)', sets:3, target:'8-12', rest:150},
    {name:'Jednoručné veslovanie na kladke (Single-Arm Cable Row)', sets:3, target:'8-12', rest:150},
    {name:'Sťahovanie kladky širokým úchopom (Wide-Grip Lat Pulldown)', sets:3, target:'8-12', rest:150},
    {name:'Rozťahy na zadné delty (Rear Delt Fly)', sets:3, target:'8-12', rest:75},
    {name:'Hanging leg raise', sets:3, target:'10-15', rest:60},
  ]},
  {id:'sun', label:'Ne', full:'Nedeľa', type:'Rest', rest:true, steps:8000},
];

// Local storage wrapper — dáta zostávajú priamo v telefóne, funguje aj offline.
const localDB = {
  get(key){
    try{
      const v = localStorage.getItem(key);
      return v === null ? null : {value: v};
    }catch(e){ return null; }
  },
  set(key, value){
    try{ localStorage.setItem(key, value); return {value}; }
    catch(e){ return null; }
  }
};

let state = {
  settings: {startDate: null, deloadInterval: 7},
  sessions: [],
  activeDay: DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay()-1].id,
  openExercise: null,
  draft: {},
};

async function loadData(){
  try{
    const s = localDB.get('settings');
    if(s && s.value) state.settings = JSON.parse(s.value);
  }catch(e){}
  if(!state.settings.startDate){
    state.settings.startDate = new Date().toISOString().slice(0,10);
    try{ localDB.set('settings', JSON.stringify(state.settings)); }catch(e){}
  }
  try{
    const s = localDB.get('sessions');
    if(s && s.value) state.sessions = JSON.parse(s.value);
  }catch(e){ state.sessions = []; }
  render();
}

function currentWeek(){
  const start = new Date(state.settings.startDate);
  const now = new Date();
  const diffDays = Math.floor((now - start) / (1000*60*60*24));
  return Math.floor(diffDays/7) + 1;
}
function isDeloadWeek(){
  const w = currentWeek();
  return w % state.settings.deloadInterval === 0;
}

function lastPerformance(exerciseName){
  for(let i = state.sessions.length-1; i>=0; i--){
    const s = state.sessions[i];
    if(s.entries && s.entries[exerciseName]){
      return {date:s.date, sets:s.entries[exerciseName]};
    }
  }
  return null;
}

function getDraft(dayId){
  if(!state.draft[dayId]) state.draft[dayId] = {};
  return state.draft[dayId];
}

function setDraftValue(dayId, exName, setIdx, field, value, restSeconds){
  const d = getDraft(dayId);
  if(!d[exName]) d[exName] = [];
  if(!d[exName][setIdx]) d[exName][setIdx] = {};
  d[exName][setIdx][field] = value;
  if((field === 'reps' || field === 'duration') && value && restSeconds){
    startRestTimer(restSeconds, exName);
  }
}

// ---- Odpočinkový časovač ----
let timerState = {interval:null, remaining:0, total:0, paused:false};
const TIMER_CIRCUMFERENCE = 138.2;

function startRestTimer(seconds, label){
  clearInterval(timerState.interval);
  timerState.remaining = seconds;
  timerState.total = seconds;
  timerState.paused = false;
  document.getElementById('timerBar').classList.add('active');
  document.getElementById('timerLabel').textContent = 'Odpočinok — ' + label.split(' (')[0].split(' —')[0];
  document.getElementById('timerPauseBtn').textContent = '⏸';
  updateTimerDisplay();
  timerState.interval = setInterval(timerTick, 1000);
  try{ navigator.vibrate && navigator.vibrate(40); }catch(e){}
}

function timerTick(){
  if(timerState.paused) return;
  timerState.remaining--;
  if(timerState.remaining <= 0){
    updateTimerDisplay();
    clearInterval(timerState.interval);
    try{ navigator.vibrate && navigator.vibrate([200,100,200,100,300]); }catch(e){}
    playBeep();
    setTimeout(()=>{ document.getElementById('timerBar').classList.remove('active'); }, 1500);
    return;
  }
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const r = Math.max(0, timerState.remaining);
  const m = Math.floor(r/60).toString().padStart(2,'0');
  const s = (r%60).toString().padStart(2,'0');
  document.getElementById('timerTime').textContent = `${m}:${s}`;
  document.getElementById('timerRingNum').textContent = r <= 0 ? '✓' : '';
  const frac = timerState.total > 0 ? r/timerState.total : 0;
  document.getElementById('timerCircle').style.strokeDashoffset = (TIMER_CIRCUMFERENCE * (1-frac)).toFixed(1);
}

function timerPauseResume(){
  timerState.paused = !timerState.paused;
  document.getElementById('timerPauseBtn').textContent = timerState.paused ? '▶' : '⏸';
}

function timerAddTime(sec){
  timerState.remaining += sec;
  timerState.total += sec;
  updateTimerDisplay();
}

function timerSkip(){
  clearInterval(timerState.interval);
  document.getElementById('timerBar').classList.remove('active');
}

function playBeep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    o.start();
    o.stop(ctx.currentTime + 0.35);
  }catch(e){}
}

async function finishWorkout(day){
  const draft = getDraft(day.id);
  const entries = {};
  let any = false;
  for(const ex of day.exercises){
    const rows = (draft[ex.name] || []).filter(r => r && (r.weight || r.reps || r.duration));
    if(rows.length){ entries[ex.name] = rows; any = true; }
  }
  if(!any){
    alert('Zapíš aspoň jeden set predtým, než tréning uložíš.');
    return;
  }
  const session = {
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    dayId: day.id,
    dayLabel: day.full,
    entries,
  };
  state.sessions.push(session);
  try{
    localDB.set('sessions', JSON.stringify(state.sessions));
  }catch(e){
    alert('Ukladanie zlyhalo, skús to znova.');
    return;
  }
  state.draft[day.id] = {};
  const msg = document.getElementById('savedMsg');
  render();
  setTimeout(()=>{
    const m = document.getElementById('savedMsg');
    if(m){ m.style.display='block'; setTimeout(()=>m.style.display='none', 2500); }
  }, 50);
}

async function logSteps(day, steps){
  const session = {
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    dayId: day.id,
    dayLabel: day.full,
    steps: Number(steps) || 0,
    rest: true,
  };
  state.sessions.push(session);
  try{
    localDB.set('sessions', JSON.stringify(state.sessions));
  }catch(e){ alert('Ukladanie zlyhalo.'); return; }
  render();
}

async function setDeloadInterval(n){
  state.settings.deloadInterval = n;
  try{ localDB.set('settings', JSON.stringify(state.settings)); }catch(e){}
  render();
}

function toggleExercise(name){
  state.openExercise = state.openExercise === name ? null : name;
  render();
}

function selectDay(id){
  state.activeDay = id;
  render();
}

function exportData(){
  const backup = {
    exportedAt: new Date().toISOString(),
    settings: state.settings,
    sessions: state.sessions,
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ppl-trening-zaloha-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const backup = JSON.parse(e.target.result);
      if(!backup.sessions || !backup.settings){
        alert('Súbor nevyzerá ako platná záloha z tejto appky.');
        return;
      }
      if(!confirm(`Nahradiť aktuálne dáta zálohou z ${backup.exportedAt ? backup.exportedAt.slice(0,10) : 'neznámeho dátumu'}? Táto akcia prepíše ${state.sessions.length} aktuálnych záznamov ${backup.sessions.length} záznamami zo zálohy.`)) return;
      state.settings = backup.settings;
      state.sessions = backup.sessions;
      localDB.set('settings', JSON.stringify(state.settings));
      localDB.set('sessions', JSON.stringify(state.sessions));
      render();
      alert('Záloha importovaná ✓');
    }catch(err){
      alert('Súbor sa nepodarilo prečítať — over, že je to správny JSON export.');
    }
  };
  reader.readAsText(file);
}

function render(){
  const app = document.getElementById('app');
  const day = DAYS.find(d => d.id === state.activeDay);
  const todayId = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay()-1].id;
  const week = currentWeek();
  const deload = isDeloadWeek();

  let html = `<div class="brand"><h1>PPL <span>Tréning</span></h1><div class="week-badge">Týždeň ${week}</div></div>`;

  if(deload){
    html += `<div class="deload-banner">🔻 DELOAD TÝŽDEŇ — znížiť váhu o 40-50 % a objem o polovicu. Budúci týždeň späť na plnú záťaž.</div>`;
  }

  html += `<div class="tabs">`;
  for(const d of DAYS){
    html += `<div class="tab ${d.id===state.activeDay?'active':''}" onclick="selectDay('${d.id}')">${d.label}${d.id===todayId?'<span class="today-dot"></span>':''}</div>`;
  }
  html += `</div>`;

  html += `<div class="day-type">${day.full} — ${day.type}</div>`;

  if(day.rest){
    const todaysSession = state.sessions.filter(s=>s.rest && s.date===new Date().toISOString().slice(0,10) && s.dayId===day.id);
    html += `<div class="rest-card">
      <div class="big">Deň voľna — cieľ ${day.steps.toLocaleString('sk-SK')} krokov</div>
      <div><input type="number" id="stepsInput" placeholder="počet krokov"></div>
      <button class="primary" style="margin-top:14px;" onclick="logSteps(DAYS.find(d=>d.id==='${day.id}'), document.getElementById('stepsInput').value)">Uložiť kroky</button>
    </div>`;
  } else {
    for(const ex of day.exercises){
      const isOpen = state.openExercise === ex.name;
      const last = lastPerformance(ex.name);
      const draft = getDraft(day.id)[ex.name] || [];
      const setsLoggedCount = draft.filter(r=>r && (r.weight||r.reps||r.duration)).length;
      html += `<div class="exercise ${isOpen?'open':''} ${setsLoggedCount>=ex.sets?'done':''}">
        <div class="ex-head" onclick="toggleExercise('${ex.name.replace(/'/g,"\\'")}')">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-target">${ex.sets} × ${ex.target}${ex.duration?'':' opak.'}</div>
            ${last ? `<div class="ex-last">posledne (${last.date}): ${last.sets.map(s=> ex.duration ? (s.duration+'s') : (s.weight+'kg×'+s.reps)).join(', ')}</div>` : ''}
          </div>
          <div class="chevron">▶</div>
        </div>
        <div class="ex-body">`;
      for(let i=0;i<ex.sets;i++){
        const row = draft[i] || {};
        if(ex.duration){
          html += `<div class="set-row">
            <div class="set-label">${i+1}</div>
            <input type="number" placeholder="sek" value="${row.duration||''}" onchange="setDraftValue('${day.id}','${ex.name.replace(/'/g,"\\'")}',${i},'duration',this.value,${ex.rest||60})">
            <div class="unit">sek</div>
          </div>`;
        } else {
          html += `<div class="set-row">
            <div class="set-label">${i+1}</div>
            <input type="number" placeholder="kg" value="${row.weight||''}" onchange="setDraftValue('${day.id}','${ex.name.replace(/'/g,"\\'")}',${i},'weight',this.value)">
            <div class="unit">kg</div>
            <input type="number" placeholder="opak" value="${row.reps||''}" onchange="setDraftValue('${day.id}','${ex.name.replace(/'/g,"\\'")}',${i},'reps',this.value,${ex.rest||90})">
            <div class="unit">rep</div>
          </div>`;
        }
      }
      html += `</div></div>`;
    }
    html += `<div class="finish-bar">
      <button class="primary" onclick='finishWorkout(DAYS.find(d=>d.id==="${day.id}"))'>Dokončiť tréning</button>
      <div class="saved-msg" id="savedMsg">Tréning uložený ✓</div>
    </div>`;
  }

  const recentSessions = state.sessions.slice(-6).reverse();
  html += `<div class="section-title">História</div>`;
  if(recentSessions.length === 0){
    html += `<div class="empty">Zatiaľ žiadne záznamy.</div>`;
  } else {
    for(const s of recentSessions){
      html += `<div class="history-item"><span>${s.dayLabel}${s.rest ? ' — '+s.steps+' krokov' : ''}</span><span class="h-date">${s.date}</span></div>`;
    }
  }

  html += `<div class="section-title">Nastavenia</div>
    <div class="settings-row"><span>Deload interval</span>
      <div class="interval-btns">
        <button class="${state.settings.deloadInterval===6?'active':''}" onclick="setDeloadInterval(6)">6t</button>
        <button class="${state.settings.deloadInterval===7?'active':''}" onclick="setDeloadInterval(7)">7t</button>
        <button class="${state.settings.deloadInterval===8?'active':''}" onclick="setDeloadInterval(8)">8t</button>
      </div>
    </div>
    <div class="settings-row"><span>Začiatok programu</span><span>${state.settings.startDate}</span></div>
    <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:8px;margin-top:6px;">
      <button class="ghost" onclick="exportData()">⬇ Exportovať zálohu</button>
      <label class="ghost" style="text-align:center;display:block;">
        ⬆ Importovať zálohu
        <input type="file" accept="application/json" onchange="importData(event)" style="display:none;">
      </label>
    </div>`;

  app.innerHTML = html;
}

loadData();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
